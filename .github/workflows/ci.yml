name: CI

on:
    push:
        branches: ['**']
    pull_request:
        branches: ['**']
    workflow_dispatch:

permissions:
    contents: read

jobs:
    check:
        name: Typecheck, lint, format
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 'lts/*'

            - name: Install dependencies
              run: npm clean-install

            - name: Run checks
              run: npm run check

            - name: Build
              run: npm run build
