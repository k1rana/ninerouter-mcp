name: Release

on:
    workflow_dispatch:
        inputs:
            release_type:
                description: 'Release type (auto = follow conventional commits)'
                type: choice
                required: true
                default: 'auto'
                options:
                    - auto
                    - major
                    - minor
                    - patch

permissions:
    contents: read

jobs:
    verify:
        name: Verify
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 'lts/*'

            - name: Install dependencies
              run: npm clean-install

            - name: Typecheck, lint, format
              run: npm run check

            - name: Build
              run: npm run build

    release:
        name: Release
        runs-on: ubuntu-latest
        needs: verify
        permissions:
            contents: write
            issues: write
            pull-requests: write
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 'lts/*'

            - name: Install dependencies
              run: npm clean-install

            - name: Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  RELEASE_TYPE: ${{ inputs.release_type }}
              run: npx semantic-release
